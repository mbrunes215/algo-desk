---
# Strategy Configuration
# This file defines all active and inactive trading strategies

# Kalshi Weather Strategy
# ARCHIVED 2026-03-26: zero-volume structural issue, $20/week ceiling confirmed
# Code preserved — DO NOT re-enable without structural market change
kalshi_weather:
  enabled: false
  params:
    min_edge: 0.05
    max_position: 100
    markets:
      - temperature
      - precipitation

# Kalshi Economic Strategy
# Trades on economic event prediction markets
kalshi_econ:
  enabled: true
  params:
    min_edge: 0.03
    events:
      - CPI
      - NFP
      - GDP

# Crypto Funding Rate Arbitrage Strategy
# Standard: spot long + perp short to collect positive 8-hourly funding
# Reverse:  spot short + perp long to collect |negative| funding
# No directional risk when properly hedged — edge is structural, not predictive
crypto_funding_arb:
  enabled: true
  params:
    # Default thresholds (apply to any symbol without an override)
    min_net_yield: 0.08       # 8% annualized net of fees to open a position
    exit_yield: 0.04          # 4% — close if yield drops here
    # Reverse arb (negative funding rates — risk-off environments)
    reverse_enabled: true     # Enable reverse arb (short spot / long perp)
    min_reverse_yield: 0.08   # 8% |annualized| net of fees to open reverse
    exit_reverse_yield: 0.04  # 4% — close reverse when |yield| drops here
    # Shared parameters
    max_basis_pct: 0.005      # 0.5% max spot/perp divergence at entry
    position_size_usd: 500    # USD notional per leg (both legs = $1000 total deployed)
    max_positions: 6          # Max concurrent arb positions (standard + reverse combined)
    max_hold_hours: 168       # 7 days — force-close stale positions (0 = disabled)
    symbols:
      - BTC
      - ETH
      - SOL
    # Per-symbol threshold overrides — ETH funding is volatile and decays fast,
    # so we require a higher entry to avoid churn (open at 8%, exit at 2%)
    symbol_overrides:
      ETH:
        min_net_yield: 0.30     # 30% annualized — ETH only enters on strong rates
        exit_yield: 0.06        # 6% — tighter exit since we entered high
        min_reverse_yield: 0.30
        exit_reverse_yield: 0.06
      SOL:
        min_net_yield: 0.15     # 15% — SOL rates are noisy, need higher bar
        min_reverse_yield: 0.15

# BTC/ETH Pairs Trading Strategy
# Market-neutral cointegration stat arb — trades the log spread Z-score
# Uncorrelated to funding arb — earns from spread reversion not rate direction
pairs_trading:
  enabled: true
  params:
    entry_z: 2.0            # Open when |Z-score| exceeds this
    exit_z: 0.5             # Close when |Z-score| drops below this
    stop_z: 3.5             # Stop-loss if spread widens beyond this
    window: 2016            # Rolling window (2016 × 5min = 7 days — more stable Z-score)
    position_size_usd: 500  # USD notional per leg ($1000 total deployed)
    max_positions: 2        # Max concurrent pairs positions
    max_hold_hours: 72      # Force close after 72 hours regardless

# IBKR Opening Range Breakout (ORB) Strategy
# Trades /MNQ breakout from the first 15-minute range after the 9:30 AM ET open
# Entry: 1-min close above range high (long) or below range low (short)
# Stop: opposite side of range | Target: range width × R:R multiple
# One trade per day max, hard close at 15:55 ET
ibkr_orb:
  enabled: true
  params:
    symbol: MNQ                 # Micro E-mini Nasdaq 100
    range_minutes: 15           # Opening range window (9:30–9:45 ET)
    rr_multiple: 2.0            # Take profit = range width × this
    contracts: 1                # Position size (1 MNQ ≈ $2K margin)
    max_daily_loss_usd: 200     # Stop trading for the day at this loss
    min_range_points: 10        # Skip if opening range < 10 pts ($20 risk)
    max_range_points: 100       # Skip if opening range > 100 pts ($200 risk)
    close_time_et: "15:55"      # Hard close time (5 min before futures RTH close)

# IBKR Mean Reversion Strategy
# Trades on mean reversion patterns for US equities
ibkr_mean_reversion:
  enabled: false
  params:
    lookback: 20
    z_threshold: 2.0
    symbols:
      - SPY
      - QQQ
      - IWM
